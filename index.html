<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDM Birthday - R35 & Supra</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cyan: #00f2ff;
            --pink: #ff007b;
            --dark: #050505;
        }

        body {
            margin: 0;
            background-color: var(--dark);
            color: white;
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        header { text-align: center; margin-top: 50px; }

        .glitch-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 5rem);
            color: var(--cyan);
            text-shadow: 4px 4px var(--pink);
            text-transform: uppercase;
            margin: 0;
        }

        .tagline {
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: #888;
            margin-bottom: 30px;
        }

        .car-container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .car-card {
            width: 340px;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.5s ease;
            cursor: pointer;
        }

        .car-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            border-color: var(--cyan);
        }

        .image-box img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .car-info { padding: 25px; text-align: center; }
        .car-info h2 { font-family: 'Orbitron', sans-serif; color: var(--cyan); margin-bottom: 10px; }

        .rev-btn {
            margin: 40px;
            padding: 18px 50px;
            background: linear-gradient(45deg, var(--cyan), #0088ff);
            color: black;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.4);
            transition: 0.3s;
        }

        .rev-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.6);
        }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="glitch-text">শুভ জন্মদিন!</h1>
        <p class="tagline">SPEED HUNTER EDITION</p>
    </header>

    <section class="car-container">
        <div class="car-card">
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1594912958079-05f41052207b?auto=format&fit=crop&q=80&w=800" alt="GTR R35">
            </div>
            <div class="car-info">
                <h2>GT-R R35</h2>
                <p>গডজিলার মতো শক্তিশালী হও!</p>
            </div>
        </div>

        <div class="car-card" style="border-bottom: 4px solid var(--pink);">
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1610451559897-40081d77a28e?auto=format&fit=crop&q=80&w=800" alt="Supra MK5">
            </div>
            <div class="car-info">
                <h2 style="color: var(--pink);">SUPRA</h2>
                <p>কিংবদন্তি হয়ে ওঠো!</p>
            </div>
        </div>
    </section>

    <button class="rev-btn" onclick="playRev()">ইঞ্জিন স্টার্ট করো! 🏎️💨</button>

    <audio id="engineSound" src="https://www.soundjay.com/transportation/car-accelerating-01.mp3"></audio>

    <script>
        function playRev() {
            const audio = document.getElementById('engineSound');
            audio.currentTime = 0; // Chạy lại từ đầu
            audio.play();

            // Hiệu ứng rung màn hình
            document.body.classList.add('shake');
            
            setTimeout(() => {
                document.body.classList.remove('shake');
                alert("💨 STUTUTUTU...!!!\n\nশুভ জন্মদিন! (Chúc mừng sinh nhật!)\nতোমার জীবন হোক গতির মতো আনন্দময়।");
            }, 2000);
        }
    </script>
</body>
</html>
